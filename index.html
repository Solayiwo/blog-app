<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; connect-src 'self' http://localhost http://127.0.0.1 ws:; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;"
    /> -->
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width, viewport-fit=cover"
    />
    <link rel="stylesheet" href="css/index.css" />
    <title>Blog App</title>
  </head>
  <body>
    <div id="app">
      <div id="login-modal" class="modal" style="display: none">
        <div class="modal-content">
          <h2>Admin Login</h2>
          <input type="text" id="login-user" placeholder="WordPress Username" />
          <input
            type="password"
            id="login-pass"
            placeholder="Application Password"
          />
          <div class="modal-actions">
            <button id="performLogin" class="btn-success">Login</button>
            <button id="closeLogin" class="btn-cancel">Cancel</button>
          </div>
        </div>
      </div>
      <!-- <header class="app-header">
        <h1>SuMon Blog</h1>

        <button id="authTrigger" class="btn-secondary">Login</button>
        <button id="showCreateForm" class="btn-primary">+</button>
      </header> -->

      <header class="app-header">
        <h1>SuMon Blog</h1>
        <div class="header-actions">
          <button id="showCreateForm" class="btn-primary" style="display: none">
            +
          </button>

          <button id="authTrigger" class="btn-secondary">Login</button>
        </div>
      </header>

      <section id="post-feed" class="view">
        <div id="posts-container"></div>
      </section>

      <div id="post-modal" class="modal" style="display: none">
        <div class="modal-content">
          <h2 id="modal-title">New Post</h2>
          <input type="hidden" id="edit-post-id" />
          <input type="text" id="post-title" placeholder="Title" />
          <textarea id="post-body" placeholder="Content..."></textarea>
          <div class="modal-actions">
            <button id="savePost" class="btn-success">Save</button>
            <button id="closeModal" class="btn-cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <!-- <script src="cordova.js"></script> -->
    <script src="js/index.js"></script>
  </body>
</html>
